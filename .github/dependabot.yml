version: 2

updates:
  # npm dependencies — production and dev. Weekly so PR noise stays
  # bounded; security advisories arrive immediately regardless of this
  # schedule.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Mirror the `.npmrc` min-release-age quarantine: Dependabot has no
    # visibility into npm client config, so without this it would propose
    # versions younger than the quarantine window.
    cooldown:
      default-days: 3
    ignore:
      # Keep @types/node aligned with the Node 24 runtime (.nvmrc, CI
      # workflows). Major bumps run ahead of the runtime and type-check
      # against APIs that don't exist in production.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Batch patch/minor bumps together so Dependabot doesn't open one
      # PR per transitively-related package. Majors still land as their
      # own PRs so the breaking-change review happens in isolation.
      minor-and-patch:
        # sharp is quarantined into its own PR, not ignored: 0.35.x corrupts
        # uploaded avatars on Vercel (#469) and fails e2e every week. Isolating
        # it keeps the rest of the batch mergeable while leaving a standalone
        # sharp PR whose e2e status tells us the moment the corruption is fixed
        # upstream — then drop this exclude and merge the bump.
        exclude-patterns:
          - "sharp"
        update-types:
          - patch
          - minor

  # GitHub Actions used in workflows (actions/checkout, setup-node, etc.)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # Shorter than npm's 3 days: Actions bumps are lower-volume and
    # tag-pinned, but a brief bake window still catches a freshly-published
    # tag that gets retagged or yanked.
    cooldown:
      default-days: 2
