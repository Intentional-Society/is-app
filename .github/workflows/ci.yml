name: CI

on:
  pull_request:
    branches: [main]

# Minimum GITHUB_TOKEN scope the job actually needs. Default on public
# repos is `write` on most resources, which would let a compromised
# dependency in `npm install` push to main or open PRs under our name.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Functional Tests
    runs-on: ubuntu-latest
    env:
      # Local Supabase CLI Postgres defaults — matches what `supabase start` provisions.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase start
      - run: npm install
      - run: npm run lint
      - run: node scripts/migrate.mjs
      # check-env (first step of dev:db) requires .env.local. CI's
      # DATABASE_URL env var above still wins over the file value
      # because process.env beats dotenv-loaded values.
      - run: cp .env.local.example .env.local
      - run: npm run test:functional
