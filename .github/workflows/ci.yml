name: CI

on:
  pull_request:
    branches: [main]

# Minimum GITHUB_TOKEN scope the job actually needs.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Functional Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v6

      # Detect whether any non-docs files changed. Docs-only PRs skip
      # every subsequent step but the job still reports success, which
      # satisfies the branch-protection required check.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # `every`: a file counts toward `code` only if it matches all
          # three patterns (AND). Without this, paths-filter ORs them and
          # every file matches `**`, so `code` is always true.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!CLAUDE.md'

      - if: steps.filter.outputs.code == 'false'
        run: echo "Docs-only PR — lint and functional tests skipped."

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.code == 'true'
        with:
          node-version: 24
          cache: npm

      # The `supabase` devDependency is the same native binary that
      # supabase/setup-cli would download — its postinstall fetches it
      # from supabase/cli releases. Running it via npm keeps the CLI
      # version locked in package-lock.json (and tracked by Dependabot)
      # rather than floating behind `version: latest`, and removes one
      # third-party Action from the supply chain.
      - if: steps.filter.outputs.code == 'true'
        run: npm install

      - if: steps.filter.outputs.code == 'true'
        run: npx supabase start

      - if: steps.filter.outputs.code == 'true'
        run: npm run lint

      - if: steps.filter.outputs.code == 'true'
        run: npm run typecheck

      - if: steps.filter.outputs.code == 'true'
        run: node scripts/migrate.mjs

      # check-env (first step of dev:db) requires .env.local. CI's
      # DATABASE_URL env var above still wins over the file value
      # because process.env beats dotenv-loaded values.
      - if: steps.filter.outputs.code == 'true'
        run: cp .env.local.example .env.local

      - if: steps.filter.outputs.code == 'true'
        run: npm run test:functional
