name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run test:functional
