name: CodeQL

# Static analysis. Runs on every PR into main, on every push to main
# so main's baseline is always scanned, and weekly so newly-published
# query updates catch issues in code that hasn't changed.
#
# Two languages are scanned:
#   - javascript-typescript: the app itself.
#   - actions: the workflow YAMLs — catches patterns like unpinned
#     third-party actions or pwn-request misconfigurations.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 22 * * 5" # Friday 22:37 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the Security tab.
      security-events: write
      # Required to fetch private / internal CodeQL query packs.
      packages: read
      # Required for private repos; harmless on public ones.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      # `sarif` is the on-disk filename codeql-action/analyze writes for
      # this language. It matches `language` for single-token languages
      # (e.g. `actions`), but `javascript-typescript` is normalized down
      # to `javascript.sarif` — so the two have to be tracked separately
      # for the dismiss-alerts step below to find the file.
      matrix:
        include:
          - language: actions
            sarif: actions.sarif
          - language: javascript-typescript
            sarif: javascript.sarif

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Neither language is compiled, so no build is needed.
          build-mode: none
          # security-extended adds a broader set of lower-severity
          # checks on top of the default query pack. Worth the extra
          # runtime on a project this size.
          queries: security-extended

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          # Write SARIF to a known path so the dismiss-alerts step can
          # read the in-source suppression markers (see below).
          output: sarif-results

      # Closes alerts whose source lines carry a `// lgtm[<rule>]` or
      # `// codeql[<rule>]` suppression marker. CodeQL parses those
      # markers into the SARIF `suppressions[]` field, but the standard
      # codeql-action pipeline does not act on them — this step does.
      # Guarded to main because dismissals are a repo-global property:
      # running on a PR or feature branch would dismiss main's alerts
      # based on unmerged code.
      - name: Dismiss alerts marked suppressed in SARIF
        if: github.ref == 'refs/heads/main'
        # v2.0.2 — GitHub-owned but in the advanced-security org
        # rather than github/, so SHA-pin to lock the version.
        uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e
        with:
          sarif-id: ${{ steps.analyze.outputs.sarif-id }}
          sarif-file: sarif-results/${{ matrix.sarif }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
